name: 构建多平台安装包

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: 设置 Node.js 25
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: 清空 v1.0.8 现有的二进制 Release 文件（保留源代码 zip/tar.gz）
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "获取 v1.0.8 当前所有 Release 文件..."
          $assets = gh release view v1.0.8 --json assets --jq '.assets[] | "\(.name)|\(.id)"'
          if (-not $assets) {
            Write-Host "v1.0.8 没有任何 asset，无需清空"
            exit 0
          }
          Write-Host "当前 v1.0.8 的文件列表："
          $assets | ForEach-Object { Write-Host "  $_" }
          Write-Host ""
          Write-Host "删除非源代码的二进制文件（保留 .zip / .tar.gz 源代码包）..."
          $toDelete = @()
          foreach ($line in $assets) {
            $parts = $line -split '\|', 2
            $name = $parts[0]
            $id = $parts[1]
            $ext = [System.IO.Path]::GetExtension($name).ToLower()
            if ($ext -eq '.zip' -or $ext -eq '.gz' -or $ext -eq '.bz2' -or $ext -eq '.xz') {
              $baseName = [System.IO.Path]::GetFileNameWithoutExtension($name)
              $baseExt = [System.IO.Path]::GetExtension($baseName).ToLower()
              if ($baseExt -eq '.tar' -or $baseName -match '^source') {
                Write-Host "  保留源代码包: $name"
                continue
              }
            }
            $toDelete += $name
          }
          if ($toDelete.Count -eq 0) {
            Write-Host "没有需要删除的二进制文件"
            exit 0
          }
          Write-Host ""
          Write-Host "将删除以下文件："
          $toDelete | ForEach-Object { Write-Host "  $_" }
          foreach ($name in $toDelete) {
            Write-Host "  删除: $name"
            gh release delete-asset v1.0.8 $name --yes 2>&1
          }
          Write-Host ""
          Write-Host "删除完成，v1.0.8 当前文件列表："
          gh release view v1.0.8 --json assets --jq '.assets[] | .name'

      - name: 安装依赖 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pnpm install

      - name: 安装依赖 (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: pnpm install

      # ============== Windows 构建 ==============
      - name: 构建 Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: pnpm run build:win

      # ============== macOS 签名 + 构建 ==============
      - name: 写入 macOS 签名证书
        if: matrix.os == 'macos-latest' && env.MAC_CERT_P12 != ''
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
        run: |
          echo "$MAC_CERT_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          echo "证书已写入 $RUNNER_TEMP/certificate.p12"

      - name: 导入 macOS 签名证书到钥匙串
        if: matrix.os == 'macos-latest' && env.MAC_CERT_P12 != ''
        env:
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security import $RUNNER_TEMP/certificate.p12 -k $KEYCHAIN_PATH -P "$MAC_CERT_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "证书已导入到临时钥匙串"

      - name: 构建 macOS
        if: matrix.os == 'macos-latest'
        env:
          # 代码签名
          CSC_LINK: ${{ env.MAC_CERT_P12 && format('{0}/certificate.p12', env.RUNNER_TEMP) || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          # Apple 公证
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "启用代码签名 + Apple 公证"
            export CSC_LINK="file://$RUNNER_TEMP/certificate.p12"
          else
            echo "未配置签名证书，跳过签名（仍可本地测试，但用户首次打开会被 Gatekeeper 拦截）"
          fi
          pnpm run build:mac

      # ============== Linux 构建 ==============
      - name: 构建 Linux
        if: matrix.os == 'ubuntu-latest'
        run: pnpm run build:linux

      # ============== 上传构建产物 ==============
      - name: 上传 Windows 构建产物
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: ruanftrix-windows-x64
          path: |
            release/*.exe
            release/*.blockmap

      - name: 上传 macOS 构建产物
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v6
        with:
          name: ruanftrix-macos
          path: |
            release/*.dmg
            release/*.zip

      - name: 上传 Linux 构建产物
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: ruanftrix-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.snap
            release/*.zip

      # ============== 自动追加到 v1.0.8 Release ==============
      - name: 追加 Windows 文件到 v1.0.8 Release
        if: matrix.os == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          Write-Host "查找 release 目录中的 Windows 文件..."
          Get-ChildItem -Path release -Include *.exe,*.blockmap -File | ForEach-Object { Write-Host "  $($_.Name)  ($($_.Length) bytes)" }
          $files = @(Get-ChildItem -Path release -Include *.exe,*.blockmap -File)
          if ($files.Count -eq 0) {
            Write-Host "未找到 Windows 文件，跳过上传"
            exit 0
          }
          Write-Host ""
          Write-Host "将上传以下文件到 v1.0.8 Release："
          $files | ForEach-Object { Write-Host "  $($_.FullName)" }
          Write-Host ""
          $paths = $files | ForEach-Object { $_.FullName }
          gh release upload v1.0.8 @paths --clobber 2>&1
          Write-Host ""
          Write-Host "上传完成，v1.0.8 当前文件列表："
          gh release view v1.0.8 --json assets --jq '.assets[] | "\(.name)  (\(.size) bytes)"'

      - name: 追加 macOS 文件到 v1.0.8 Release
        if: matrix.os == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "查找 release 目录中的 macOS 文件..."
          ls -la release/
          echo ""
          shopt -s nullglob
          files=(release/*.dmg release/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "未找到 macOS 文件，跳过上传"
            exit 0
          fi
          echo "将上传以下文件到 v1.0.8 Release："
          printf '  %s\n' "${files[@]}"
          echo ""
          gh release upload v1.0.8 "${files[@]}" --clobber 2>&1 || \
            gh release upload v1.0.8 "${files[@]}" 2>&1
          echo ""
          echo "上传完成，查看 v1.0.8 Release 当前文件列表："
          gh release view v1.0.8 --json assets --jq '.assets[] | "\(.name)  (\(.size) bytes)"'

      - name: 追加 Linux 文件到 v1.0.8 Release
        if: matrix.os == 'ubuntu-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "查找 release 目录中的 Linux 文件..."
          ls -la release/
          echo ""
          shopt -s nullglob
          files=(release/*.AppImage release/*.deb release/*.snap release/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "未找到 Linux 文件，跳过上传"
            exit 0
          fi
          echo "将上传以下文件到 v1.0.8 Release："
          printf '  %s\n' "${files[@]}"
          echo ""
          gh release upload v1.0.8 "${files[@]}" --clobber 2>&1 || \
            gh release upload v1.0.8 "${files[@]}" 2>&1
          echo ""
          echo "上传完成，查看 v1.0.8 Release 当前文件列表："
          gh release view v1.0.8 --json assets --jq '.assets[] | "\(.name)  (\(.size) bytes)"'
